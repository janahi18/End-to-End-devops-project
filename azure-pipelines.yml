trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageName: devops-app
  acrName:  janahidevopsacr

stages:

# =========================
# BUILD STAGE
# =========================
- stage: Build

  jobs:
  - job: DockerBuild

    steps:

    - task: Docker@2
      displayName: Build Docker Image

      inputs:
        command: build
        Dockerfile: Dockerfile
        repository: $(imageName)
        tags: |
          $(Build.BuildId)

    - task: Docker@2
      displayName: Push Docker Image

      inputs:
        command: push
        repository: $(imageName)
        containerRegistry: acr-service-connection
        tags: |
          $(Build.BuildId)

# =========================
# DEPLOY STAGE
# =========================
- stage: Deploy

  dependsOn: Build

  jobs:
  - deployment: DeployToAKS

    environment: production

    strategy:
      runOnce:

        deploy:
          steps:

          - task: KubernetesManifest@1

            inputs:
              action: deploy

              kubernetesServiceConnection: aks-service-connection

              manifests: |
                k8s/deployment.yaml
                k8s/service.yaml

              containers: |
                 janahidevopsacr.azurecr.io/devops-app:$(Build.BuildId)