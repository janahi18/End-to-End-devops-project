trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  acrName: janahidevopsacr
  imageName: devops-app

# ==================================
# BUILD STAGE
# ==================================
stages:

- stage: Build
  displayName: Build and Push Image

  jobs:
  - job: DockerBuild
    displayName: Docker Build Job

    steps:

    - task: Docker@2
      displayName: Login to ACR

      inputs:
        command: login
        containerRegistry: acr-docker-connection

    - task: Docker@2
      displayName: Build and Push Docker Image

      inputs:
        command: buildAndPush
        repository: $(imageName)
        dockerfile: Dockerfile
        containerRegistry: acr-docker-connection

        tags: |
          $(Build.BuildId)

# ==================================
# DEPLOY STAGE
# ==================================

- stage: Deploy
  displayName: Deploy to AKS

  dependsOn: Build

  jobs:

  - deployment: DeployToAKS
    displayName: AKS Deployment

    environment: production

    strategy:
      runOnce:

        deploy:

          steps:

          - task: KubernetesManifest@1
            displayName: Deploy Kubernetes Manifests

            inputs:
              action: deploy

              kubernetesServiceConnection: aks-connection

              manifests: |
                $(System.DefaultWorkingDirectory)/k8s/deployment.yaml
                $(System.DefaultWorkingDirectory)/k8s/service.yaml

              containers: |
                janahidevopsacr.azurecr.io/devops-app:$(Build.BuildId)